<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <rect width="1200" height="320" fill="#0d0d0d"/>

  <!-- ZORRO-AGENT in massive block letters, pixel art style -->
  <!-- Each letter is hand-drawn with rectangles to create that chunky pixel/block look -->

  <g transform="translate(28, 45)" fill="#ffffff">

    <!-- Z -->
    <rect x="0" y="0" width="120" height="24"/>
    <rect x="88" y="24" width="32" height="24"/>
    <rect x="64" y="48" width="32" height="24"/>
    <rect x="40" y="72" width="32" height="24"/>
    <rect x="16" y="96" width="32" height="24"/>
    <rect x="0" y="120" width="120" height="24"/>

    <!-- O -->
    <rect x="140" y="0" width="110" height="24"/>
    <rect x="140" y="0" width="28" height="144"/>
    <rect x="222" y="0" width="28" height="144"/>
    <rect x="140" y="120" width="110" height="24"/>

    <!-- R -->
    <rect x="270" y="0" width="110" height="24"/>
    <rect x="270" y="0" width="28" height="144"/>
    <rect x="352" y="0" width="28" height="60"/>
    <rect x="270" y="48" width="110" height="24"/>
    <rect x="330" y="72" width="28" height="24"/>
    <rect x="352" y="96" width="28" height="48"/>

    <!-- R -->
    <rect x="400" y="0" width="110" height="24"/>
    <rect x="400" y="0" width="28" height="144"/>
    <rect x="482" y="0" width="28" height="60"/>
    <rect x="400" y="48" width="110" height="24"/>
    <rect x="460" y="72" width="28" height="24"/>
    <rect x="482" y="96" width="28" height="48"/>

    <!-- O -->
    <rect x="530" y="0" width="110" height="24"/>
    <rect x="530" y="0" width="28" height="144"/>
    <rect x="612" y="0" width="28" height="144"/>
    <rect x="530" y="120" width="110" height="24"/>

    <!-- dash -->
    <rect x="665" y="56" width="40" height="24"/>

    <!-- A -->
    <rect x="730" y="0" width="110" height="24"/>
    <rect x="730" y="0" width="28" height="144"/>
    <rect x="812" y="0" width="28" height="144"/>
    <rect x="730" y="60" width="110" height="24"/>

    <!-- G -->
    <rect x="860" y="0" width="110" height="24"/>
    <rect x="860" y="0" width="28" height="144"/>
    <rect x="860" y="120" width="110" height="24"/>
    <rect x="942" y="72" width="28" height="72"/>
    <rect x="910" y="72" width="60" height="24"/>

    <!-- E -->
    <rect x="990" y="0" width="110" height="24"/>
    <rect x="990" y="0" width="28" height="144"/>
    <rect x="990" y="56" width="80" height="24"/>
    <rect x="990" y="120" width="110" height="24"/>

    <!-- N -->
    <rect x="1120" y="0" width="28" height="144" fill="none"/>
  </g>

  <!-- Second row: N and T (overflow) + highlight color accent -->
  <g transform="translate(28, 45)" fill="#ffffff">
    <!-- N -->
    <rect x="1120" y="0" width="28" height="144"/>
    <rect x="1120" y="0" width="24" height="24"/>
    <rect x="1132" y="24" width="24" height="24"/>
    <rect x="1144" y="48" width="24" height="24"/>
  </g>

  <!-- Accent: thin red line under the text -->
  <rect x="28" y="210" width="1144" height="4" fill="#e94560" rx="2"/>

  <!-- Tagline -->
  <text x="600" y="252" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="20" fill="#666666" letter-spacing="6">THE  CLI  AGENT  THAT  EVOLVES  THROUGH  USE</text>

  <!-- Version + dots -->
  <text x="600" y="290" text-anchor="middle" font-family="monospace" font-size="14" fill="#444444" letter-spacing="3">v0.1.0</text>
</svg>
